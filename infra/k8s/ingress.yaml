apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coldcase-ingress
  namespace: coldcase
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - ccase.tech
        - api.ccase.tech
        - munin.ccase.tech
      secretName: coldcase-tls
  rules:
    - host: ccase.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.ccase.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
    - host: munin.ccase.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: munin
                port:
                  number: 80
