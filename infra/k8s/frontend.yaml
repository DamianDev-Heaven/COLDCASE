apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: coldcase
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: frontend
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: coldcase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: coldcase-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend:3000"
            - name: NEXT_PUBLIC_SIMULADOR_URL
              value: "http://simulador:4000"
          ports:
            - containerPort: 3000
