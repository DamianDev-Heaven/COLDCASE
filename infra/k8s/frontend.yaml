apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: coldcase
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: frontend
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: coldcase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: devdamian/coldcase-frontend:latest
          imagePullPolicy: Always
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.ccase.tech"
            - name: NEXT_PUBLIC_SIMULADOR_URL
              value: "https://api.ccase.tech/simulador"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
