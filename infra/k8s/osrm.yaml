apiVersion: v1
kind: Service
metadata:
  name: osrm
  namespace: coldcase
spec:
  ports:
    - port: 5000
  selector:
    app: osrm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osrm
  namespace: coldcase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osrm
  template:
    metadata:
      labels:
        app: osrm
    spec:
      initContainers:
        - name: osrm-prepare
          image: devdamian/coldcase-osrm:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if [ ! -f /data/el-salvador-latest.osrm ]; then
                echo "Downloading El Salvador OSM data..."
                curl -L --fail -o /data/el-salvador-latest.osm.pbf https://download.geofabrik.de/central-america/el-salvador-latest.osm.pbf
                echo "Extracting OSRM data..."
                osrm-extract -p /opt/car.lua /data/el-salvador-latest.osm.pbf
                echo "Partitioning OSRM data..."
                osrm-partition /data/el-salvador-latest.osrm
                echo "Customizing OSRM data..."
                osrm-customize /data/el-salvador-latest.osrm
                echo "OSRM data preparation complete!"
              else
                echo "OSRM data already exists, skipping preparation."
              fi
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: osrm-data
              mountPath: /data
      containers:
        - name: osrm
          image: devdamian/coldcase-osrm:latest
          imagePullPolicy: Always
          args: ["osrm-routed", "--algorithm", "mld", "/data/el-salvador-latest.osrm"]
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: osrm-data
              mountPath: /data
      volumes:
        - name: osrm-data
          emptyDir: {}
