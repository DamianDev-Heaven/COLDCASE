apiVersion: v1
kind: Service
metadata:
  name: osrm
  namespace: coldcase
spec:
  ports:
    - port: 5000
  selector:
    app: osrm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osrm
  namespace: coldcase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osrm
  template:
    metadata:
      labels:
        app: osrm
    spec:
      containers:
        - name: osrm
          image: coldcase-osrm:latest
          ports:
            - containerPort: 5000
          # We can load the OSRM data using a hostPath or PVC if needed,
          # but here we assume the image is pre-packaged with the Salvador OSM data.
