services:
  db:
    image: postgres:15-alpine
    container_name: coldcase_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    networks:
      - coldcase_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coldcase_backend
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_BOOST_API_KEY: ${LLM_BOOST_API_KEY}
      LLM_BOOST_BASE_URL: ${LLM_BOOST_BASE_URL}
      LLM_BOOST_MODEL_NAME: ${LLM_BOOST_MODEL_NAME}
      ZEP_API_URL: ${ZEP_API_URL}
      ZEP_API_KEY: ${ZEP_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - coldcase_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coldcase_frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL}
    depends_on:
      - backend
    networks:
      - coldcase_net

  simulador:
    build:
      context: ./simulador
      dockerfile: Dockerfile
    container_name: coldcase_simulador
    environment:
      API_URL: ${SIMULADOR_API_URL}
    depends_on:
      - backend
    networks:
      - coldcase_net

volumes:
  pgdata:

networks:
  coldcase_net:
    driver: bridge