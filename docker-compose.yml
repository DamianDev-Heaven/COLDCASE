services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    networks:
      - coldcase_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-postgres}?schema=public"
      JWT_SECRET: ${JWT_SECRET:-change-me}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-llama-3.3-70b-versatile}
      LLM_BOOST_API_KEY: ${LLM_BOOST_API_KEY:-}
      LLM_BOOST_BASE_URL: ${LLM_BOOST_BASE_URL:-}
      LLM_BOOST_MODEL_NAME: ${LLM_BOOST_MODEL_NAME:-}
      ZEP_API_URL: ${ZEP_API_URL:-https://api.getzep.com/api/v2}
      ZEP_API_KEY: ${ZEP_API_KEY:-}
      OSRM_BASE_URL: "http://osrm:5000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
    networks:
      - coldcase_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - coldcase_net

  osrm:
    build:
      context: ./osrm
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: "osrm-routed --algorithm mld /data/el-salvador-latest.osrm"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/route/v1/driving/-89.2182,13.6929;-89.2045,13.7001?overview=false"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coldcase_net

  simulador:
    build:
      context: ./simulador
      dockerfile: Dockerfile
      target: development
    environment:
      API_URL: ${SIMULADOR_API_URL:-http://backend:3000}
    depends_on:
      - backend
    networks:
      - coldcase_net

  munin:
    build:
      context: ./infra/munin
      dockerfile: Dockerfile
    container_name: coldcase_munin
    volumes: 
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - coldcase_net

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:

networks:
  coldcase_net:
    driver: bridge
