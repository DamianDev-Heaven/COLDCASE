services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    networks:
      - coldcase_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    environment:
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_BOOST_API_KEY: ${LLM_BOOST_API_KEY}
      LLM_BOOST_BASE_URL: ${LLM_BOOST_BASE_URL}
      LLM_BOOST_MODEL_NAME: ${LLM_BOOST_MODEL_NAME}
      ZEP_API_URL: ${ZEP_API_URL}
      ZEP_API_KEY: ${ZEP_API_KEY}
      OSRM_BASE_URL: "http://osrm:5000"
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - coldcase_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL}
    depends_on:
      - backend
    networks:
      - coldcase_net

  osrm:
    image: osrm/osrm-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: "osrm-routed --algorithm mld /data/el-salvador-latest.osrm"
    networks:
      - coldcase_net

  simulador:
    build:
      context: ./simulador
      dockerfile: Dockerfile
    environment:
      API_URL: ${SIMULADOR_API_URL}
    depends_on:
      - backend
    networks:
      - coldcase_net

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:

networks:
  coldcase_net:
    driver: bridge