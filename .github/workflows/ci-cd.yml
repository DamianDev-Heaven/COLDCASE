name: CI/CD COLDCASE Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Validación Backend
      - name: Instalar dependencias Backend
        run: npm ci
        working-directory: backend

      - name: Validar Estilo (Lint) - Backend
        run: npm run lint
        working-directory: backend

      # Validación Frontend
      - name: Instalar dependencias Frontend
        run: npm ci
        working-directory: frontend

      - name: Validar Estilo (Lint) - Frontend
        run: npm run lint
        working-directory: frontend

  build-docker-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build de prueba Backend (Producción)
      - name: Build Backend (Producción)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          tags: coldcase/backend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build de prueba Frontend (Producción)
      - name: Build Frontend (Producción)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          tags: coldcase/frontend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
