name: CI/CD COLDCASE Pipeline

on:
  push:
    branches: [ master, SIM, develop ]
  pull_request:
    branches: [ master, SIM, develop ]

jobs:
  validate-backend:
    name: Validar Backend (Lint, Types & Tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: backend

      - name: Validar Estilo (Lint)
        run: npm run lint
        working-directory: backend

      - name: Verificación de Tipos (TypeScript)
        run: npx tsc --noEmit
        working-directory: backend

      - name: Ejecutar Pruebas Unitarias
        run: npm run test
        working-directory: backend

  validate-frontend:
    name: Validar Frontend (Lint, Types & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Validar Estilo (Lint)
        run: npm run lint
        working-directory: frontend

      - name: Verificación de Tipos (TypeScript)
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Compilar Frontend (Build de Producción)
        run: npm run build
        working-directory: frontend

  build-docker-images:
    name: Build y Push Docker
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend
      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          tags: |
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-backend:latest
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-backend:${{ github.sha }}
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Frontend
      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          tags: |
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-frontend:latest
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-frontend:${{ github.sha }}
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://api.ccase.tech:3000
            NEXT_PUBLIC_SIMULADOR_URL=http://api.ccase.tech:3000/simulador
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Simulador
      - name: Build y Push Simulador
        uses: docker/build-push-action@v5
        with:
          context: ./simulador
          file: ./simulador/Dockerfile
          target: production
          tags: |
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-simulador:latest
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-simulador:${{ github.sha }}
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build OSRM
      - name: Build y Push OSRM
        uses: docker/build-push-action@v5
        with:
          context: ./osrm
          file: ./osrm/Dockerfile
          tags: |
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-osrm:latest
            ${{ secrets.DOCKER_USERNAME || 'devdamian' }}/coldcase-osrm:${{ github.sha }}
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-lke:
    name: Despliegue en Linode Kubernetes (LKE)
    needs: [build-docker-images]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config

      - name: Aplicar Manifiestos de Kubernetes
        run: |
          # Parchear el secreto coldcase-secrets con las credenciales de BD si no están presentes
          kubectl patch secret coldcase-secrets -n coldcase --type='json' -p='[{"op":"add","path":"/data/DB_USER","value":"YWRtaW4="},{"op":"add","path":"/data/DB_PASSWORD","value":"YWRtaW5wYXNzd29yZA=="}]' || true
          
          # Eliminar el antiguo Deployment db para liberar el PVC postgres-pvc
          kubectl delete deployment db -n coldcase --ignore-not-found=true
          
          # Aplicar manifiestos (incluyendo el nuevo StatefulSet db)
          kubectl apply -f infra/k8s/

      - name: Forzar Re-despliegue (Rolling Restart)
        run: |
          kubectl rollout restart deployment/backend deployment/frontend deployment/simulador deployment/osrm -n coldcase
          kubectl rollout status deployment/backend -n coldcase
          kubectl rollout status deployment/frontend -n coldcase
