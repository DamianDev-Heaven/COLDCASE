name: CI/CD COLDCASE Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  validate-backend:
    name: Validar Backend (Lint, Types & Tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: backend

      - name: Validar Estilo (Lint)
        run: npm run lint
        working-directory: backend

      - name: Verificación de Tipos (TypeScript)
        run: npx tsc --noEmit
        working-directory: backend

      - name: Ejecutar Pruebas Unitarias
        run: npm run test
        working-directory: backend

  validate-frontend:
    name: Validar Frontend (Lint, Types & Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Validar Estilo (Lint)
        run: npm run lint
        working-directory: frontend

      - name: Verificación de Tipos (TypeScript)
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Compilar Frontend (Build de Producción)
        run: npm run build
        working-directory: frontend

  build-docker-images:
    name: Build de Prueba Docker
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build de prueba Backend (Producción)
      - name: Build Backend (Producción)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          tags: coldcase/backend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build de prueba Frontend (Producción)
      - name: Build Frontend (Producción)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          tags: coldcase/frontend:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
